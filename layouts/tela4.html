<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELA 4</title>
    <style>
        
  body {
  margin: 0;
  background: rgb(230, 173, 225);
  font-family: Arial, sans-serif;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  height: 100vh;
}

.video-container {
  width: 80vw;
  aspect-ratio: 16 / 9;
}

.video-container iframe {
  width: 100%;
  height: 100%;
  border: 20px;
}

#player {
  width: 100%;
  height: 100%;
}

</style>
</head>
<body>
  <h1> Vídeo Institucional/página do ifsc</h1>

  <div class="video-container">
    <div id="player"></div>
  </div>

  <!-- API do YouTube -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>

  let player;

  // quando a API carrega
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: 'qgll994LTvg',
      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 0,
        rel: 0,
        modestbranding: 1
      },
      events: {
        'onReady': (event) => {
          event.target.playVideo();
        },
        'onStateChange': onPlayerStateChange
      }
    });
  }

  // quando o estado do vídeo muda
  function onPlayerStateChange(event) {

    // 0 = terminou
    if (event.data === YT.PlayerState.ENDED) {
      console.log("Vídeo terminou");

      atualizarConteudo();
    }
  }

  function atualizarConteudo(){
    player.seekTo(0);
    player.playVideo();
  }

  </script>
