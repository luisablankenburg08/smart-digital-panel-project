<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avisos</title>
<link rel="stylesheet" href="style-avisos.css">
<link rel="icon" type="image/png" href="https://www.ifsc.edu.br/o/ifsc-internet-lf6_2-theme/images/favicon.ico">
</head>

<body>
<button class="btn-voltar" onclick="voltarMenu()">Voltar</button>
<h2 class="titulosplaylists">
  Avisos
</h2>

<!-- NOVO AVISO -->
<h3>Novo Aviso</h3>

<textarea
  id="aviso-texto"
  placeholder="Digite a mensagem..."
></textarea>

<button
  class="btn-playlist"
  onclick="adicionarAvisoPersonalizado()"
>
  Adicionar à Playlist
</button>

<div class="cards-avisos" id="cards-avisos"></div>
<!-- AÇÕES -->
<div class="acoes-playlist">

  <button
    class="btn-playlist"
    onclick="salvarPlaylist()"
  >
    Salvar Playlist
  </button>

  <button
    class="btn-playlist destaque"
    onclick="aplicarTV()"
  >
    Aplicar nesta TV
  </button>

  <button
    class="btn-playlist destaque"
    onclick="aplicarTodas()"
  >
    Aplicar em Todas
  </button>

</div>

<script>

function voltarMenu() {
  window.location.href = "/controller.html"; }

let params =
  new URLSearchParams(window.location.search);
let tv = params.get("tv");
let avisos = [];

// =====================================
// AVISOS PRONTOS
// =====================================

const avisosProntos = [

  {
    titulo:"Horários dos Treinos",
    texto:
      "Treinos de handebol: quartas às 13h30h e sexta às 8h.",
    tipo:"pronto",
    selecionado:false
  },

 {
    titulo:"Mensagem Padrão",
    texto:
      "Smart Digital Panel Project",
    tipo:"pronto",
    selecionado:false
  },
  {
    titulo:"Oportunidades IFSC",
    texto:
      "Inscrições abertas para bolsas e monitorias.",
    tipo:"pronto",
    selecionado:false
  },

  {
    titulo:"Biblioteca",
    texto:
      "Renove seus livros pelo portal acadêmico.",
    tipo:"pronto",
    selecionado:false
  }

];

// adiciona prontos
avisos.push(...avisosProntos);

// =====================================
// RENDERIZA
// =====================================

function renderizarAvisos(){

  let container =
    document.getElementById("cards-avisos");

  container.innerHTML = "";



  avisos
    .filter(a=>a.tipo==="pronto")
    .forEach((aviso,index)=>{

      container.innerHTML += `

        <div
          class="
            card-aviso
            ${aviso.selecionado ? "selecionado" : ""}
          "

          onclick="toggleAviso(${index})"
        >

          <h3>${aviso.titulo}</h3>

          <p>${aviso.texto}</p>

        </div>
      `;
    });

  // =========================
  // PERSONALIZADOS
  // =========================

  let personalizados =
    avisos.filter(a=>a.tipo==="personalizado");

  if(personalizados.length > 0){

    container.innerHTML += `
      <h3 class="secao-titulo">
        Novos Avisos
      </h3>
    `;

    personalizados.forEach((aviso,index)=>{

      let realIndex =
        avisos.indexOf(aviso);

      container.innerHTML += `

        <div
          class="
            card-aviso
            card-personalizado
            ${aviso.selecionado ? "selecionado" : ""}
          "

          onclick="toggleAviso(${realIndex})"
        >

          <h3>${aviso.titulo}</h3>

          <p>${aviso.texto}</p>

        </div>
      `;
    });
  }
}

// =====================================
// TOGGLE
// =====================================

function toggleAviso(index){
  avisos[index].selecionado =
    !avisos[index].selecionado;
  renderizarAvisos();
}

// =====================================
// ADICIONA PERSONALIZADO
// =====================================

function adicionarAvisoPersonalizado(){

  let texto = document.getElementById("aviso-texto").value;

  if(!texto){
    alert("Digite um aviso");
    return;
  }

  avisos.push({
    titulo:"Aviso Personalizado",
    texto:texto,
    tipo:"personalizado",
    selecionado:true
  });

  document.getElementById("aviso-texto").value = "";

  renderizarAvisos();
}

// =====================================
// PLAYLIST SELECIONADA
// =====================================

function obterSelecionados(){
  return avisos.filter(a=>a.selecionado);
}

// =====================================
// APLICAR TV
// =====================================

async function aplicarTV(){

  let selecionados = obterSelecionados();

  if(selecionados.length === 0){
    alert("Selecione ao menos um aviso");
    return;
  }

  // salva
  await fetch("/save-playlist", {

    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      tv:tv,
      type:"avisos",
      items:selecionados
    })
  });

  // ativa
  await fetch("/update", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      tv:tv,
      pagina:"modo:avisos",
      intervalo:0
    })
  });

  alert("Avisos aplicados");

  window.location.href = "/controller.html";
}

// =====================================
// APLICAR TODAS
// =====================================

async function aplicarTodas(){

  let selecionados = obterSelecionados();

  if(selecionados.length === 0){
    alert("Selecione ao menos um aviso");
    return;
  }

  await fetch("/update-all", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      pagina:"modo:avisos",
      type:"avisos",
      intervalo:0,
      items:selecionados
    })
  });

  alert("Avisos aplicados em todas");

  window.location.href = "/controller.html";
}

renderizarAvisos();

</script>

</body>
</html>
