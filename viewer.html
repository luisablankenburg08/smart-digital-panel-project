<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viewer</title>
</head>


<!-- VIDEO PLAYER -->
<video id="videoPlayer" style="display:none;width:100%;height:100vh;" autoplay muted></video>

<!-- IFRAME (modo antigo / fallback) -->
<iframe id="frame" style="border:none;width:100%;height:100vh;"></iframe>

<script>

// =========================
// 🔧 CONFIG INICIAL
// =========================

let params = new URLSearchParams(window.location.search);
let preview = params.get("preview") === "true";

let tvId = preview
  ? params.get("tv")
  : localStorage.getItem("tvId");

// controle interno
let ultimaPagina = null;
let intervaloAtual = 2000;
let modoAtual = "iframe";

// timers
let heartbeatInterval = null;
let polling = null;
let timeoutVideo = null;

// playlist
let playlist = [];
let videoIndex = 0;

// =========================
// REGISTRO
// =========================
async function registrar(){

  if(preview) return;

  try{
    let res = await fetch("/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ tv: tvId })
    });

    let data = await res.json();

    tvId = data.tv;
    localStorage.setItem("tvId", tvId);

    iniciarHeartbeat();
    await ping();

  }catch(e){
    console.error("Erro register:", e);
  }
}

// =========================
// HEARTBEAT
// =========================
async function ping(){

  if(preview) return;

  try{
    await fetch("/ping", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ tv: tvId }),
      keepalive: true
    });
  }catch(e){
    console.error("Erro ping:", e);
  }
}

function iniciarHeartbeat(){
  if(preview) return;

  if(heartbeatInterval) clearInterval(heartbeatInterval);
  heartbeatInterval = setInterval(ping, 5000);
}

// =========================
// DESCONEXÃO
// =========================
function desligar(){

  if(preview) return;

  if(tvId){
    const params = new URLSearchParams();
    params.append('tv', tvId);
    navigator.sendBeacon("/unregister", params);
  }
}

window.addEventListener("beforeunload", desligar);
window.addEventListener("pagehide", desligar);
window.addEventListener("unload", desligar);

// =========================
// 🎬 PLAYER DE VÍDEO
// =========================
function rodarPlaylistVideos(){

  let video = document.getElementById("videoPlayer");
  let frame = document.getElementById("frame");

  frame.style.display = "none";
  video.style.display = "block";

  function proximo(){

    if(playlist.length === 0){
      document.body.innerHTML = "<h2>Sem vídeos cadastrados</h2>";
      return;
    }

    let item = playlist[videoIndex];

    video.src = item.src;
    video.currentTime = 0;
    video.play();

    if(timeoutVideo) clearTimeout(timeoutVideo);

    timeoutVideo = setTimeout(() => {
      videoIndex = (videoIndex + 1) % playlist.length;
      proximo();
    }, item.duration * 1000);
  }

  proximo();
}

// =========================
// 🔄 LOOP PRINCIPAL
// =========================
async function carregar(){

  try{
    let res = await fetch("/state");
    let state = await res.json();

    if(!tvId || !state[tvId]){
      if(!preview){
        console.log("Re-registrando TV...");
        localStorage.removeItem("tvId");
        await registrar();
      }
      return;
    }

    let config = state[tvId];

    let pagina = typeof config === "string"
      ? config
      : config.pagina;

    let novoIntervalo = typeof config === "string"
      ? 2000
      : config.intervalo ?? 2000;

    let video = document.getElementById("videoPlayer");
    let frame = document.getElementById("frame");

    // =========================
    // 🎬 MODO VÍDEOS
    // =========================
    if(pagina && pagina.includes("videos")){

      if(modoAtual !== "video"){

        modoAtual = "video";

        let res = await fetch(`/playlist?tv=${tvId}&type=videos`);
        playlist = await res.json();

        videoIndex = 0;

        rodarPlaylistVideos();
      }

      return;
    }

    // =========================
    // 🖥️ MODO IFRAME (fallback)
    // =========================
    if(modoAtual !== "iframe"){

      modoAtual = "iframe";

      video.style.display = "none";
      frame.style.display = "block";

      if(timeoutVideo) clearTimeout(timeoutVideo);
    }

    if(ultimaPagina !== pagina){
      frame.src = pagina;
      ultimaPagina = pagina;
    }

    // refresh automático (legado)
    if(novoIntervalo > 0){

      let refreshUrl = pagina;

      if(refreshUrl.includes("?")){
        refreshUrl += "&_=" + Date.now();
      }else{
        refreshUrl += "?_=" + Date.now();
      }

      if(Date.now() - intervaloAtual >= novoIntervalo){
        frame.src = refreshUrl;
        intervaloAtual = Date.now();
      }
    }

  }catch(e){
    console.error("Erro ao carregar:", e);
  }
}

// =========================
// 🚀 INICIALIZAÇÃO
// =========================
async function iniciar(){

  if(!preview){
    await registrar();
    await carregar();
    polling = setInterval(carregar, 2000);
  }else{
    console.log("Modo preview ativo");
    await carregar();
    polling = setInterval(carregar, 5000);
  }
}

iniciar();

</script>

</body>
</html>
