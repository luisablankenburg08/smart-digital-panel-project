<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensalamento 2026</title>
    <link rel="stylesheet" href="style-playlists.css">
    <link rel="icon" type="image/png" href="https://www.ifsc.edu.br/o/ifsc-internet-lf6_2-theme/images/favicon.ico">
</head>

<body>
    <button class="btn-voltar" onclick="voltarMenu()">Voltar</button>
    <h2 class="titulosplaylists">Ensalamento 2026</h2>

<div id="preview"></div>

<div>
    <button class="btn-playlist" onclick="aplicarEnsalamento()">Aplicar e Salvar</button>
    <button class="btn-playlist destaque" onclick="aplicarTodas()">Aplicar em todas as telas </button>

    
</div>
<script>
    
function voltarMenu() {
  window.location.href = "/controller.html"; }

  
async function aplicarEnsalamento(){

  const tv = localStorage.getItem("tvSelecionada");

  await fetch("/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      tv: tv,
      pagina: "ensalamento",
      intervalo: 60000 // pode atualizar a cada 1 min
    })
  });

  alert("Ensalamento aplicado!");
}


// aplicar em todas as TVs
async function aplicarTodas(){

  await fetch("/update-all", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      pagina: "ensalamento",
      intervalo: 60000
    })
  });

  alert("Ensalamento aplicado em todas!");
}


function montarGrade(data){

  const grid = [];

  data.linhas.forEach((linha, i) => {

    if(!grid[i]) grid[i] = [];

    let col = 0;

    linha.forEach(cell => {

      while(grid[i][col]) col++;

      for(let r = 0; r < cell.rowspan; r++){
        for(let c = 0; c < cell.colspan; c++){

          if(!grid[i + r]) grid[i + r] = [];

          grid[i + r][col + c] = cell.texto;

        }
      }

      col++;
    });

  });

  return grid;
}

async function carregarPreview(){

  const container = document.getElementById("preview");

  container.innerHTML = "Carregando preview...";

  try{

    const res = await fetch("/api/ensalamento");

    const dados = await res.json();

    const grid = montarGrade(dados);

    let html = `<div style="display:flex; flex-direction:column;">`;

    // cabeçalho
    html += `<div style="display:grid; grid-template-columns:repeat(${dados.cabecalho.length},1fr); font-weight:bold;">`;

    dados.cabecalho.forEach(c => {
      html += `<div>${c}</div>`;
    });

    html += `</div>`;

    // primeiras linhas
    grid.slice(0,10).forEach(row => {

      html += `<div style="display:grid; grid-template-columns:repeat(${dados.cabecalho.length},1fr);">`;

      row.forEach(cell => {
        html += `<div>${cell || ""}</div>`;
      });

      html += `</div>`;
    });

    html += `</div>`;

    container.innerHTML = html;

  }
  catch(e){
  console.error("Erro preview:", e);
  container.innerHTML = "Erro no preview";
}
}

carregarPreview();

</script>
</body>
</html>
