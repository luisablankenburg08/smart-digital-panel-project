<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>

<body style="margin:0">

<iframe id="frame" style="border:none;width:100%;height:100vh;"></iframe>

<script>

let tvId = localStorage.getItem("tvId");
let heartbeatInterval;
let loop;

// controle de atualização visual
let intervaloAtual = 2000;
let ultimoUpdate = 0;

async function registrar(){
  try{
    let res = await fetch("/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ tv: tvId })
    });

    let data = await res.json();

    tvId = data.tv;
    localStorage.setItem("tvId", tvId);

    iniciarHeartbeat();

    // 🔥 ENVIA PRIMEIRO PING IMEDIATO
    await fetch("/ping", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ tv: tvId })
    });

  }catch(e){
    console.error("Erro register:", e);
  }
}

// heartbeat
async function iniciarHeartbeat(){
  if(heartbeatInterval) clearInterval(heartbeatInterval);
  
  heartbeatInterval = setInterval(async () => {
    try{
      await fetch("/ping", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ tv: tvId }),
        keepalive: true
      });
    }catch(e){
      console.error("Erro heartbeat:", e);
    }
  }, 5000);
}

// desconectar
function desligar(){
  if(tvId){
    const params = new URLSearchParams();
    params.append('tv', tvId);
    navigator.sendBeacon("/unregister", params);
  }
}

window.addEventListener("beforeunload", desligar);
window.addEventListener("pagehide", desligar);
window.addEventListener("unload", desligar);

async function carregar(){

  try{
    let res = await fetch("/state");
    let state = await res.json();

    if(!tvId || !state[tvId]){
      console.log("TV não registrada. Registrando novamente...");
      localStorage.removeItem("tvId");
      await registrar();
      return;
    }

    let config = state[tvId];

    let url = typeof config === "string" ? config : config.pagina;
    let novoIntervalo = typeof config === "string" ? 2000 : config.intervalo ?? 2000;

    // 🔥 Atualiza intervalo dinamicamente
    if(novoIntervalo !== intervaloAtual){
      intervaloAtual = novoIntervalo;

      clearInterval(loop);

      // 🔥 Se intervalo = 0 → não cria loop
      if(intervaloAtual > 0){
        loop = setInterval(carregar, intervaloAtual);
      }
    }

    let frame = document.getElementById("frame");
    let fullUrl = location.origin + "/" + url;

    // 🔥 Se atualização DESABILITADA → não mexe na tela
    if(intervaloAtual === 0){
      return;
    }

    // 🔥 Cache bust só quando realmente vai atualizar
    if(url.includes("?")){
      url += "&_=" + Date.now();
    }else{
      url += "?_=" + Date.now();
    }

    if(frame.src !== fullUrl){
      frame.src = url;
    }

  }catch(e){
    console.error("Erro ao carregar:", e);
  }
}

async function iniciar(){
  await registrar();

  carregar();

  if(intervaloAtual > 0){
    loop = setInterval(carregar, intervaloAtual);
  }
}

iniciar();

</script>

</body>
</html>
