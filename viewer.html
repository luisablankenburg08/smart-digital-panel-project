<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viewer</title>
</head>

<body style="margin:0">

<iframe id="frame" style="border:none;width:100%;height:100vh;"></iframe>

<script>

let tvId = localStorage.getItem("tvId");

// controle interno
let ultimaPagina = null;
let intervaloAtual = 2000;

// timers
let heartbeatInterval = null;
let polling = null;

// =========================
// REGISTRO
// =========================
async function registrar(){
  try{
    let res = await fetch("/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ tv: tvId })
    });

    let data = await res.json();

    tvId = data.tv;
    localStorage.setItem("tvId", tvId);

    iniciarHeartbeat();

    // ping imediato
    await ping();

  }catch(e){
    console.error("Erro register:", e);
  }
}

// =========================
// HEARTBEAT
// =========================
async function ping(){
  try{
    await fetch("/ping", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ tv: tvId }),
      keepalive: true
    });
  }catch(e){
    console.error("Erro ping:", e);
  }
}

function iniciarHeartbeat(){
  if(heartbeatInterval) clearInterval(heartbeatInterval);

  heartbeatInterval = setInterval(ping, 5000);
}

// =========================
// DESCONEXÃO
// =========================
function desligar(){
  if(tvId){
    const params = new URLSearchParams();
    params.append('tv', tvId);
    navigator.sendBeacon("/unregister", params);
  }
}

window.addEventListener("beforeunload", desligar);
window.addEventListener("pagehide", desligar);
window.addEventListener("unload", desligar);

// =========================
// LOOP PRINCIPAL
// =========================
async function carregar(){

  try{
    let res = await fetch("/state");
    let state = await res.json();

    // TV não registrada → recria
    if(!tvId || !state[tvId]){
      console.log("TV não registrada. Re-registrando...");
      localStorage.removeItem("tvId");
      await registrar();
      return;
    }

    let config = state[tvId];

    let pagina = typeof config === "string" ? config : config.pagina;
    let novoIntervalo = typeof config === "string" ? 2000 : config.intervalo ?? 2000;

    let frame = document.getElementById("frame");

    // =========================
    // TROCA DE TELA (SEMPRE)
    // =========================
    if(ultimaPagina !== pagina){
      frame.src = pagina;
      ultimaPagina = pagina;
    }

    // =========================
    // REFRESH AUTOMÁTICO
    // =========================
    if(novoIntervalo > 0){

      let refreshUrl = pagina;

      if(refreshUrl.includes("?")){
        refreshUrl += "&_=" + Date.now();
      }else{
        refreshUrl += "?_=" + Date.now();
      }

      // evita refresh duplicado imediato
      if(Date.now() - intervaloAtual >= novoIntervalo){
        frame.src = refreshUrl;
        intervaloAtual = Date.now();
      }

    }

  }catch(e){
    console.error("Erro ao carregar:", e);
  }
}

// =========================
// INICIALIZAÇÃO
// =========================
async function iniciar(){

  await registrar();

  // primeira execução imediata
  await carregar();

  // polling leve e constante (melhor prática)
  polling = setInterval(carregar, 2000);
}

iniciar();

</script>

</body>
</html>
