<!DOCTYPE html>
<html lang="pt-br">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vídeos</title>
  <link rel="stylesheet" href="/playlists/style-playlists.css">
  <link rel="icon" type="image/png" href="https://www.ifsc.edu.br/o/ifsc-internet-lf6_2-theme/images/favicon.ico">
</head>

<body>
<button class="btn-voltar" onclick="voltarMenu()">Voltar</button>
<h1 class="titulosplaylists">Vídeos</h1>

<div id="info-tv"></div>

<div id="lista-videos"></div>

<div class="acoes-playlist">

  <button
    class="btn-playlist"
    onclick="salvarPlaylist()"
  >
    Aplicar Playlist
  </button>

  <button
    class="btn-playlist destaque"
    onclick="aplicarTodas()"
  >
    Aplicar em todas as telas
  </button>

</div>
<script>

function voltarMenu() {
  window.location.href = "/controller.html"; }

async function aplicarTodas(){

  if(playlist.length === 0){

    alert("Selecione ao menos um vídeo");

    return;
  }

  await fetch("/update-all", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({

      pagina: "videos",
      type: "videos",
      intervalo: 0,
      items: playlist

    })

  });

  alert("Vídeos aplicados em todas as TVs");
}


// ========================================
// TV ATUAL
// ========================================

const params = new URLSearchParams(window.location.search);
const tv = params.get("tv");

document.getElementById("info-tv").innerText =
"Configurando vídeos da " + tv;


// ========================================
// PLAYLIST PRONTA
// ========================================

const videosDisponiveis = [

  {
    titulo: "Institucional do IFSC - REDE",
    iframe:  "https://www.youtube.com/embed/1GiXd3lAjrE?autoplay=1&mute=1",
    thumb: "https://img.youtube.com/vi/1GiXd3lAjrE/hqdefault.jpg",
    duracao: 60
  },

  {
    titulo: "Curso Sistemas para Internet",
    iframe: "https://www.youtube.com/embed/tD2tECmRbTQ?autoplay=1&mute=1",
    thumb: "https://img.youtube.com/vi/tD2tECmRbTQ/hqdefault.jpg",
    duracao: 60
  },

  {
    titulo: " Institucional do IFSC - Garopaba",
    iframe:  "https://www.youtube.com/embed/ZjC2rCLbIVc?autoplay=1&mute=1",
    thumb: "https://img.youtube.com/vi/ZjC2rCLbIVc/hqdefault.jpg",
    duracao: 60
  },

 {
    titulo: "SEPEI 2026 - Caçador",
    iframe:  "https://www.youtube.com/embed/wbLtKq_WKRs?autoplay=1&mute=1",
    thumb: "https://img.youtube.com/vi/wbLtKq_WKRs/hqdefault.jpg",
    duracao: 60
  },

  {
    titulo: "Curso Técnico em Informática",
    iframe: "https://www.youtube.com/embed/4m7xcDovykU?autoplay=1&mute=1",
    thumb: "https://img.youtube.com/vi/4m7xcDovykU/hqdefault.jpg",
    duracao: 60
  }
]

// playlist selecionada
let playlist = [];

// ========================================
// RENDERIZA VÍDEOS
// ========================================

function renderVideos(){

  const lista = document.getElementById("lista-videos");
  lista.innerHTML = "";

  videosDisponiveis.forEach(video => {

    let card = document.createElement("div");
    card.className = "video-card";

    card.innerHTML = `
    
      <img src="${video.thumb}" class="video-thumb">

      <div class="video-info">

        <h3>${video.titulo}</h3>

        <button class="selecionar-btn">
          Selecionar
        </button>

      </div>

    `;

    let btn = card.querySelector(".selecionar-btn");

    btn.onclick = () => {

      let existe =
        playlist.find(v => v.iframe === video.iframe);

      if(existe){
        playlist =
          playlist.filter(v => v.iframe !== video.iframe);
        card.classList.remove("video-selecionado");
        btn.innerText = "Selecionar";

      }else{
        playlist.push(video);
        card.classList.add("video-selecionado");
        btn.innerText = "Selecionado";
      }
    };
    lista.appendChild(card);
  });
}


// ========================================
// SALVAR PLAYLIST
// ========================================

async function salvarPlaylist(){

  if(playlist.length === 0){
    alert("Selecione ao menos um vídeo");
    return;
  }

  await fetch("/save-playlist", {

    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      tv: tv,
      type: "videos",
      items: playlist
    })
  });

  // =========================
  // MUDA ESTADO DA TV
  // =========================

  await fetch("/update", {

    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
    tv: tv,
    pagina: "videos",
    intervalo: 0,
  })
  });

  alert("Playlist aplicada!");

  window.location.href = "/controller.html";
}
renderVideos();
</script>

</body>
</html>
